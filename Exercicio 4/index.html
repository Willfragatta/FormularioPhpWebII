<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário – 5 números diferentes</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 0.75rem; }
        input[type="number"] { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1.25rem; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cinco números diferentes</h1>
    <p>Informe cinco valores numéricos distintos, na ordem desejada. Os dados serão processados em PHP.</p>

    <form action="processar.php" method="post">
        <label for="n1">Número 1</label>
        <input type="number" id="n1" name="numeros[]" required step="any">

        <label for="n2">Número 2</label>
        <input type="number" id="n2" name="numeros[]" required step="any">

        <label for="n3">Número 3</label>
        <input type="number" id="n3" name="numeros[]" required step="any">

        <label for="n4">Número 4</label>
        <input type="number" id="n4" name="numeros[]" required step="any">

        <label for="n5">Número 5</label>
        <input type="number" id="n5" name="numeros[]" required step="any">

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
