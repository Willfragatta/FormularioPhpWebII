<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depoimentos Acadêmicos</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 24px;
        }
        form {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
        }
        label .obrigatorio { color: #c00; }
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <h1>Depoimentos Acadêmicos</h1>

    <form action="processar.php" method="post">
        <label for="nome">Nome <span class="obrigatorio">*</span></label>
        <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">

        <label for="email">E-mail <span class="obrigatorio">*</span></label>
        <input type="email" id="email" name="email" required placeholder="seu@email.com">

        <label for="curso">Curso</label>
        <select id="curso" name="curso">
            <option value="">Selecione o curso</option>
            <option value="Administração">Administração</option>
            <option value="Ciência da Computação">Ciência da Computação</option>
            <option value="Direito">Direito</option>
            <option value="Engenharia">Engenharia</option>
            <option value="Pedagogia">Pedagogia</option>
            <option value="Outro">Outro</option>
        </select>

        <label for="depoimento">Depoimento</label>
        <textarea id="depoimento" name="depoimento" placeholder="Conte sua experiência acadêmica..."></textarea>

        <button type="submit">Enviar depoimento</button>
    </form>
</body>
</html>
