<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário – Compra de produto</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 28rem; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 0.75rem; }
        input { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
        button { margin-top: 1.25rem; padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Dados da compra</h1>
    <p>Informe o produto, o valor unitário e a quantidade. O processamento ocorre em PHP.</p>

    <form action="processar.php" method="post">
        <label for="nome_produto">Nome do produto</label>
        <input type="text" id="nome_produto" name="nome_produto" required maxlength="200" autocomplete="off">

        <label for="valor">Valor (unitário)</label>
        <input type="number" id="valor" name="valor" required min="0" step="0.01" placeholder="Ex.: 19.90">

        <label for="quantidade">Quantidade comprada</label>
        <input type="number" id="quantidade" name="quantidade" required min="1" step="1">

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
